name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: bash -n on every script
        run: |
          for f in scripts/*.sh scripts/test/*.sh; do
            echo "::group::$f"
            bash -n "$f" && echo "ok"
            echo "::endgroup::"
          done
      - name: shellcheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y shellcheck
          shellcheck -S warning scripts/*.sh scripts/test/*.sh || true

  self-test:
    runs-on: ubuntu-24.04
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: skill self-test
        run: bash scripts/test/run.sh
